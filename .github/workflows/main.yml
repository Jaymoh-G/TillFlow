# Deploy Laravel backend + Vite build to shared hosting over FTP.
#
# Required repository SECRETS (Settings → Secrets and variables → Actions):
#   FTP_HOST          — FTP server hostname (e.g. ftp.example.com)
#   FTP_USERNAME      — FTP user
#   FTP_PASSWORD      — FTP password
#   VITE_TILLFLOW_API_URL — Production API base, e.g. https://tillflowpos.breezetech.co.ke/api/v1
#
# server-dir is fixed in this workflow to /tillflowpos.breezetech.co.ke/ (Laravel project root on the FTP host; must mirror local backend/).
#
# Hosting: point the subdomain document root at Laravel public/ (e.g. .../tillflowpos.breezetech.co.ke/public), not the project root.
#
# Frontend (Vite) after CI: index.html is backend/public/spa/index.html only. Hashed JS/CSS from Vite go to backend/public/assets/ (sibling folder). The built HTML references /assets/*.js and /assets/*.css — those URLs map to public/assets/ on disk, not inside public/spa/.
#
# backend/ is a Git submodule pointing at Jaymoh-G/TillFlow. CI checks out that repo at the commit pinned in this repo (git rev-parse HEAD:backend).
# Secret TillFlow_submodule_CI: PAT with Contents: Read on Jaymoh-G/TillFlow (required if private). If checkout fails with missing ref, push that commit to TillFlow or run git submodule update in the parent and commit a new pointer.
#
# Optional repository VARIABLES (Settings → Variables → Actions):
#   FTP_PROTOCOL      — ftp (default) or ftps
#   FTP_PORT          — port number (default 21; use your host’s FTPS port if needed)

name: Build and deploy (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ftp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve pinned backend commit
        id: backend_sha
        run: |
          set -e
          sha=$(git rev-parse HEAD:backend)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Pinned backend submodule commit: $sha"

      - name: Checkout backend (Jaymoh-G/TillFlow at pinned commit)
        uses: actions/checkout@v4
        with:
          repository: Jaymoh-G/TillFlow
          ref: ${{ steps.backend_sha.outputs.sha }}
          path: backend
          token: ${{ secrets.TillFlow_submodule_CI || github.token }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: mbstring, openssl, pdo, tokenizer, xml, ctype, curl, fileinfo, bcmath
          coverage: none

      - name: Composer install (production)
        working-directory: backend
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build frontend (Vite)
        env:
          VITE_TILLFLOW_API_URL: ${{ secrets.VITE_TILLFLOW_API_URL }}
        run: npm run build

      - name: Copy Vite output for root SPA (assets under public/; shell HTML under public/spa/)
        run: |
          set -e
          mkdir -p backend/public/spa backend/public/assets
          find backend/public/spa -mindepth 1 -delete 2>/dev/null || true
          find backend/public/assets -mindepth 1 -delete 2>/dev/null || true
          if [ ! -d dist/assets ] || [ -z "$(ls -A dist/assets 2>/dev/null)" ]; then
            echo "::error::Vite build produced no files under dist/assets. Check npm run build and vite.config (base/build.outDir)."
            exit 1
          fi
          cp -r dist/assets/. backend/public/assets/
          cp dist/index.html backend/public/spa/index.html
          for f in favicon.ico robots.txt manifest.json manifest.webmanifest sw.js; do
            if [ -f "dist/$f" ]; then cp "dist/$f" "backend/public/$f"; fi
          done

      - name: List SPA files to deploy (public/spa, public/assets)
        run: |
          echo "---- backend/public/spa ----"
          ls -la backend/public/spa || true
          echo "---- backend/public/assets (first 30) ----"
          ls -la backend/public/assets | head -30
          echo "---- file counts ----"
          spa_n=$(find backend/public/spa -type f | wc -l)
          assets_n=$(find backend/public/assets -type f | wc -l)
          echo "spa: $spa_n files"
          echo "assets: $assets_n files"
          if [ "$assets_n" -eq 0 ]; then
            echo "::error::No files under backend/public/assets — FTP would deploy HTML only. Fix Vite build/copy before deploying."
            exit 1
          fi

      # FTP-Deploy-Action requires non-empty `server`; unset FTP_HOST becomes empty and triggers "Input required and not supplied: server".
      - name: Verify FTP_HOST secret
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          if [ -z "$FTP_HOST" ]; then
            echo "::error::Repository secret FTP_HOST is missing or empty. Add it under Settings → Secrets and variables → Actions (your FTP hostname, e.g. ftp.yourhost.com)."
            exit 1
          fi

      - name: Deploy backend over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ${{ vars.FTP_PROTOCOL || 'ftp' }}
          port: ${{ vars.FTP_PORT || '21' }}
          local-dir: ./backend/
          server-dir: /tillflowpos.breezetech.co.ke/
          log-level: standard
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env*
            **/.env.*
            **/.ftp-deploy-sync-state.json
            **/tests/**
            **/phpunit.xml
            **/phpunit.xml.dist
